<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ระบบออกใบเสร็จรับเงิน | มทร.สุวรรณภูมิ</title>
<script src="supabase-config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--red:#8a1f2d;--gold:#b8860b;--bg:#f7f4ed;--line:#ddd;--ink:#1f2937}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Tahoma,'Sarabun',sans-serif;color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer}.btn{background:#eee}.pri{background:var(--red);color:#fff}.gold{background:var(--gold);color:#fff}.bad{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.hide{display:none!important}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.box{background:#fff;border-radius:24px;box-shadow:0 12px 40px #0002;overflow:hidden;max-width:900px;width:100%;display:grid;grid-template-columns:1fr 1.1fr}.hero{background:linear-gradient(150deg,var(--red),var(--gold));color:white;padding:38px}.logo{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;background:white;color:var(--red);font-weight:900;margin-bottom:18px}.form{padding:38px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#f3f4f6;padding:6px;border-radius:14px}.tabs button{background:transparent}.tabs .on{background:#fff;color:var(--red)}label{display:block;margin:12px 0 6px;font-weight:700}input,select,textarea{width:100%;border:1px solid #cfd3d8;border-radius:10px;padding:10px;background:white}textarea{min-height:68px}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#231f20;color:#fff;padding:20px}.side button{width:100%;text-align:left;margin:4px 0;background:transparent;color:#eee}.side button.on,.side button:hover{background:#ffffff22}.main{padding:24px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.pill{border-radius:999px;padding:6px 10px;background:#fff;border:1px solid var(--line);font-size:13px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 5px 18px #0000000d}.grid{display:grid;gap:12px}.g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:1fr 1fr}.row{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;align-items:end}.c2{grid-column:span 2}.c3{grid-column:span 3}.c4{grid-column:span 4}.c6{grid-column:span 6}.c8{grid-column:span 8}.c12{grid-column:span 12}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid #eee;padding:8px;text-align:left;vertical-align:top}th{background:#fafafa}.tag{border-radius:99px;padding:3px 8px;font-size:12px;font-weight:700;background:#eee}.actions{display:flex;gap:6px;flex-wrap:wrap}.actions button{padding:6px 9px;font-size:13px}.item{display:grid;grid-template-columns:1fr 150px auto;gap:8px}.total{text-align:right;background:#fff7e6;border:1px solid #f7d880;border-radius:14px;padding:12px}.print{display:none}.page{width:148mm;min-height:210mm;background:white;padding:9mm;margin:0 auto;page-break-after:always;position:relative;color:#111}.page.cancel:after{content:'ยกเลิก';position:absolute;top:43%;left:50%;transform:translate(-50%,-50%) rotate(-25deg);font-size:62px;font-weight:900;color:#b91c1c22;border:7px solid #b91c1c22;padding:8px 28px}.rhead{display:grid;grid-template-columns:55px 1fr 125px;gap:8px;align-items:start}.garuda{border:1px solid var(--red);border-radius:50%;height:55px;display:grid;place-items:center;color:var(--red);font-weight:900;font-size:11px}.center{text-align:center}.rtitle{font-size:17px;font-weight:900}.meta{font-size:12px;line-height:1.7}.rtab{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:8px}.rtab td,.rtab th{border:1px solid #111;padding:6px;font-size:12px}.itemsCell{height:88mm;vertical-align:top;line-height:1.55}.wm{position:absolute;inset:80mm 0 0;text-align:center;font-size:72px;font-weight:900;color:#8a1f2d0b;pointer-events:none}.right{text-align:right}.sig{display:inline-block;text-align:center;min-width:70mm;margin-top:18px;line-height:1.8}.sig div:first-child{border-bottom:1px dotted #111;height:22px}@media(max-width:900px){.box,.app,.g4,.g2{grid-template-columns:1fr}.side{position:static}.row{grid-template-columns:1fr}.c2,.c3,.c4,.c6,.c8,.c12{grid-column:auto}.item{grid-template-columns:1fr}}@media print{body *{visibility:hidden!important}.print,.print *{visibility:visible!important}.print{display:block!important;position:absolute;left:0;top:0}.page{margin:0}@page{size:A5 portrait;margin:0}}
</style></head><body>
<section id="login" class="login"><div class="box"><div class="hero"><div class="logo">RUS</div><h1>ระบบออกใบเสร็จรับเงิน</h1><p>มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ<br>ต้นฉบับ/สำเนา รายงาน เล่มใบเสร็จ และฐานข้อมูลกลาง</p></div><div class="form"><div class="tabs"><button id="tu" class="on" onclick="role='user';drawLogin()">User</button><button id="ta" onclick="role='admin';drawLogin()">Admin</button></div><form onsubmit="doLogin(event)"><div id="uBox"><label>รหัสผู้ใช้งาน 4 หลัก</label><input id="uCode" maxlength="4" inputmode="numeric"></div><div id="aBox" class="hide"><label>Username</label><input id="aUser"><label>Password</label><input id="aPass" type="password"></div><button class="pri" style="width:100%;margin-top:16px">เข้าสู่ระบบ</button><p id="mode" class="pill">Local Browser</p></form></div></div></section>
<section id="app" class="app hide"><aside class="side"><h2>RUS Receipt</h2><div class="card" style="background:#ffffff12;border-color:#ffffff22"><b id="who"></b><br><small id="who2"></small></div><nav id="nav"></nav><button onclick="logout()">ออกจากระบบ</button></aside><main class="main"><div class="top"><h1 id="title"></h1><span id="db" class="pill">Local Browser</span></div><div id="view"></div></main></section><div id="print" class="print"></div>
<script>
const KEY='rus_receipt_v5',ADMIN='admin',PASS='9999';let role='user',me=null,view='receipt',sb=null,remote=false,saveTimer=null,editCode=null,repMode='detail';
function id(){return 'id_'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function base(){return{orgName:'มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ',orgAddress:'ที่อยู่มหาวิทยาลัย / ปรับแก้ในเมนูระบบ',position:'เจ้าหน้าที่ผู้รับชำระเงิน',users:[{code:'1001',name:'เจ้าหน้าที่รับเงิน',active:true}],titles:['นาย','นาง','นางสาว','ดร.','อื่นๆ'],items:['ค่าลงทะเบียน','ค่าธรรมเนียมธนาคาร','ค่าบำรุงการศึกษา'],projects:[{name:'ไม่ระบุโครงการ',active:true},{name:'โครงการบริการวิชาการ',active:true}],payerBanks:['ธนาคารกรุงไทย','ธนาคารไทยพาณิชย์','ธนาคารกสิกรไทย','ธนาคารกรุงเทพ'],uniBanks:[{id:'bank1',bank:'ธนาคารกรุงไทย',name:'มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ',no:'000-0-00000-0',active:true}],books:[{id:'book1',bookNo:'2569-001',start:1,end:500,latest:0,active:true,closed:false}],receipts:[]}}
let s=mig(JSON.parse(localStorage.getItem(KEY)||'null')||base());function mig(x){x=Object.assign(base(),x||{});x.projects=(x.projects||[]).map(p=>typeof p=='string'?{name:p,active:true}:p);if(!x.projects.some(p=>p.name=='ไม่ระบุโครงการ'))x.projects.unshift({name:'ไม่ระบุโครงการ',active:true});x.users=(x.users||[]).map(u=>Object.assign({active:true},u));x.books=(x.books||[]).map(b=>Object.assign({id:id(),active:true,closed:false,latest:0},b));x.uniBanks=(x.uniBanks||[]).map(b=>Object.assign({id:id(),active:true},b));x.receipts=x.receipts||[];return x}
async function connect(){let c=window.RECEIPT_APP_SUPABASE||{};if(!c.url||!c.anonKey||!window.supabase)return;try{sb=supabase.createClient(c.url,c.anonKey);let r=await sb.from('app_state').select('data').eq('id','main').single();if(r.error){let z=await sb.from('app_state').upsert({id:'main',data:s}).select('data').single();if(z.error)throw z.error;if(z.data)s=mig(z.data.data)}else s=mig(r.data.data);remote=true;sb.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'app_state'},p=>{if(p.new&&p.new.data){s=mig(p.new.data);saveLocal();render();checkUser()}}).subscribe()}catch(e){console.warn(e);remote=false}drawMode()}
function saveLocal(){localStorage.setItem(KEY,JSON.stringify(s))}async function save(now=false){s=mig(s);saveLocal();drawMode();if(remote){clearTimeout(saveTimer);let f=async()=>{let r=await sb.from('app_state').upsert({id:'main',data:s});if(r.error)alert('บันทึกฐานข้อมูลกลางไม่สำเร็จ: '+r.error.message)};now?await f():saveTimer=setTimeout(f,350)}}
function drawMode(){let t=remote?'Supabase Realtime':'Local Browser';['mode','db'].forEach(i=>{let e=document.getElementById(i);if(e)e.textContent=t})}function drawLogin(){tu.classList.toggle('on',role=='user');ta.classList.toggle('on',role=='admin');uBox.classList.toggle('hide',role!='user');aBox.classList.toggle('hide',role!='admin')}function doLogin(e){e.preventDefault();if(role=='admin'){if(aUser.value.trim()==ADMIN&&aPass.value==PASS){me={role:'admin',name:'ผู้ดูแลระบบ',code:'admin'};view='dash';enter()}else alert('Username หรือ Password ไม่ถูกต้อง')}else{let u=s.users.find(x=>x.code==uCode.value.trim());if(!/^\d{4}$/.test(uCode.value.trim()))return alert('กรุณากรอกรหัส 4 หลัก');if(!u)return alert('ไม่พบรหัสนี้');if(!u.active)return alert('User ถูกปิดใช้งาน');me={role:'user',name:u.name,code:u.code};view='receipt';enter()}}
function enter(){login.classList.add('hide');app.classList.remove('hide');who.textContent=me.name;who2.textContent=me.role=='admin'?'Admin':'User '+me.code;menu();render()}function logout(){me=null;app.classList.add('hide');login.classList.remove('hide')}function checkUser(){if(!me||me.role!='user')return true;let u=s.users.find(x=>x.code==me.code);if(!u||!u.active){alert('User นี้ถูกปิดใช้งานแล้ว');logout();return false}return true}
function menu(){let m=me.role=='admin'?[['dash','แดชบอร์ด'],['users','ผู้ใช้งาน'],['setup','เมนูระบบ'],['banks','บัญชีธนาคาร'],['books','เล่มที่/เลขที่'],['receipts','ใบเสร็จ'],['reports','รายงาน'],['receipt','ออกใบเสร็จ']]:[['receipt','ออกใบเสร็จ']];nav.innerHTML=m.map(a=>`<button class="${view==a[0]?'on':''}" onclick="view='${a[0]}';menu();render()">${a[1]}</button>`).join('')}
function render(){if(!me)return;let map={dash:'แดชบอร์ด',users:'ผู้ใช้งาน',setup:'เมนูระบบ',banks:'บัญชีธนาคาร',books:'เล่มที่/เลขที่',receipts:'ใบเสร็จ',reports:'รายงาน',receipt:'บันทึกรายการชำระเงิน'};title.textContent=map[view]||'';if(me.role!='admin'&&view!='receipt')view='receipt';view=='dash'&&(viewEl(dash()));view=='users'&&(viewEl(users()));view=='setup'&&(viewEl(setup()));view=='banks'&&(viewEl(banks()));view=='books'&&(viewEl(books()));view=='receipts'&&(viewEl(receipts()));view=='reports'&&(viewEl(reports()),updReport());view=='receipt'&&(viewEl(receiptForm()),addLine(),calc())}function viewEl(h){document.getElementById('view').innerHTML=h}function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function money(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}function dth(x){return new Date(x).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}function day(x){return new Date(x).toLocaleDateString('th-TH')}
function dash(){let normal=s.receipts.filter(r=>r.status!='ยกเลิก'),cancel=s.receipts.filter(r=>r.status=='ยกเลิก'),net=normal.reduce((a,r)=>a+Number(r.total||0),0);return `<div class="grid g4"><div class="card"><b>ทั้งหมด</b><h1>${s.receipts.length}</h1></div><div class="card"><b>ปกติ</b><h1>${normal.length}</h1></div><div class="card"><b>ยกเลิก</b><h1>${cancel.length}</h1></div><div class="card"><b>ยอดสุทธิ</b><h1>${money(net)}</h1></div></div><div class="card"><h3>ใบเสร็จล่าสุด</h3>${rTable(s.receipts.slice(-8).reverse())}</div>`}
function users(){return `<div class="grid g2"><div class="card"><h3>${editCode?'แก้ไข':'เพิ่ม'} User</h3><form onsubmit="saveUser(event)"><label>รหัส 4 หลัก</label><input id="uc" ${editCode?'readonly':''} value="${editCode||''}"><label>ชื่อ-นามสกุล</label><input id="un" value="${editCode?esc((s.users.find(u=>u.code==editCode)||{}).name):''}"><button class="pri">บันทึก</button></form></div><div class="card"><table><tr><th>รหัส</th><th>ชื่อ</th><th>สถานะ</th><th></th></tr>${s.users.map(u=>`<tr><td>${u.code}</td><td>${esc(u.name)}</td><td><span class="tag">${u.active?'ใช้งาน':'ปิด'}</span></td><td class="actions"><button onclick="editCode='${u.code}';render()">แก้ไข</button><button onclick="togUser('${u.code}')">${u.active?'ปิด':'เปิด'}</button><button class="bad" onclick="delUser('${u.code}')">ลบ</button></td></tr>`).join('')}</table></div></div>`}
async function saveUser(e){e.preventDefault();let code=uc.value.trim(),name=un.value.trim();if(!/^\d{4}$/.test(code))return alert('รหัสต้องเป็น 4 หลัก');let u=s.users.find(x=>x.code==code);if(u&&!editCode)return alert('รหัสซ้ำ');u?u.name=name:s.users.push({code,name,active:true});editCode=null;await save(1);render()}async function togUser(c){let u=s.users.find(x=>x.code==c);u.active=!u.active;await save(1);render()}async function delUser(c){if(confirm('ลบ User?')){s.users=s.users.filter(u=>u.code!=c);await save(1);render()}}
function setup(){return `<div class="grid g2"><div class="card"><h3>ข้อมูลองค์กร</h3><label>ชื่อมหาวิทยาลัย</label><input id="org" value="${esc(s.orgName)}"><label>ที่อยู่</label><textarea id="addr">${esc(s.orgAddress)}</textarea><label>ตำแหน่ง</label><input id="pos" value="${esc(s.position)}"><button class="pri" onclick="s.orgName=org.value;s.orgAddress=addr.value;s.position=pos.value;save(1);render()">บันทึก</button></div>${opt('คำนำหน้า','titles')}${opt('รายการชำระเงิน','items')}${opt('ธนาคารผู้ชำระ','payerBanks')}<div class="card"><h3>ชื่อโครงการ</h3><input id="np"><button onclick="s.projects.push({name:np.value,active:true});save(1);render()">เพิ่ม</button><table>${s.projects.map((p,i)=>`<tr><td>${esc(p.name)}</td><td>${p.active?'เปิด':'ปิด'}</td><td>${p.name=='ไม่ระบุโครงการ'?'':`<button onclick="s.projects[${i}].active=!s.projects[${i}].active;save(1);render()">เปิด/ปิด</button><button class='bad' onclick="s.projects.splice(${i},1);save(1);render()">ลบ</button>`}</td></tr>`).join('')}</table></div></div>`}function opt(t,k){return `<div class="card"><h3>${t}</h3><input id="${k}"><button onclick="let v=document.getElementById('${k}').value.trim();if(v&&!s.${k}.includes(v))s.${k}.push(v);save(1);render()">เพิ่ม</button><p>${s[k].map((x,i)=>`<span class='tag'>${esc(x)} <b onclick="if('${x}'!='อื่นๆ'){s.${k}.splice(${i},1);save(1);render()}">×</b></span>`).join(' ')}</p></div>`}
function banks(){return `<div class="card"><h3>บัญชีมหาวิทยาลัย</h3><div class="row"><div class="c3"><input id="bb" placeholder="ธนาคาร"></div><div class="c4"><input id="bn" placeholder="ชื่อบัญชี"></div><div class="c3"><input id="bno" placeholder="เลขบัญชี"></div><div class="c2"><button class="pri" onclick="s.uniBanks.push({id:id(),bank:bb.value,name:bn.value,no:bno.value,active:true});save(1);render()">เพิ่ม</button></div></div><table><tr><th>ธนาคาร</th><th>ชื่อบัญชี</th><th>เลขบัญชี</th><th>สถานะ</th><th></th></tr>${s.uniBanks.map(b=>`<tr><td>${esc(b.bank)}</td><td>${esc(b.name)}</td><td>${esc(b.no)}</td><td>${b.active?'เปิด':'ปิด'}</td><td><button onclick="let b=s.uniBanks.find(x=>x.id=='${b.id}');b.active=!b.active;save(1);render()">เปิด/ปิด</button><button class='bad' onclick="s.uniBanks=s.uniBanks.filter(x=>x.id!='${b.id}');save(1);render()">ลบ</button></td></tr>`).join('')}</table></div>`}
function books(){return `<div class="card"><h3>เพิ่มเล่ม</h3><div class="row"><div class="c3"><input id="bo" placeholder="เล่มที่"></div><div class="c2"><input id="st" type="number" value="1"></div><div class="c2"><input id="en" type="number" value="500"></div><div class="c2"><input id="la" type="number" value="0"></div><div class="c3"><button class="pri" onclick="addBook()">เพิ่ม</button></div></div></div><div class="card"><table><tr><th>เล่ม</th><th>ช่วง</th><th>ล่าสุด</th><th>สถานะ</th><th></th></tr>${s.books.map(b=>`<tr><td>${esc(b.bookNo)}</td><td>${b.start}-${b.end}</td><td>${b.latest}</td><td>${b.active&&!b.closed?'ใช้งาน':b.closed?'ปิด':'ไม่ใช้งาน'}</td><td class="actions"><button onclick="s.books.forEach(x=>x.active=false);let b=s.books.find(x=>x.id=='${b.id}');if(!b.closed)b.active=true;save(1);render()">ตั้งใช้</button><button onclick="let b=s.books.find(x=>x.id=='${b.id}');b.closed=!b.closed;if(b.closed)b.active=false;save(1);render()">เปิด/ปิดเล่ม</button><button class='gold' onclick="exportCSV(rows().filter(r=>r.bookNo=='${b.bookNo}'),'book_${b.bookNo}.csv')">ส่งออก</button><button class='bad' onclick="if(confirm('ควรส่งออกก่อนลบ ต้องการลบเล่มพร้อมใบเสร็จ?')){s.receipts=s.receipts.filter(r=>r.bookNo!='${b.bookNo}');s.books=s.books.filter(x=>x.id!='${b.id}');save(1);render()}">ลบ</button></td></tr>`).join('')}</table></div>`}function addBook(){let a=+st.value,b=+en.value,l=+la.value;if(b<a||b-a+1>500)return alert('1 เล่มไม่เกิน 500 เลข');s.books.push({id:id(),bookNo:bo.value,start:a,end:b,latest:l,active:false,closed:false});save(1);render()}
function receipts(){return `<div class="card"><h3>ใบเสร็จทั้งหมด</h3>${rTable(s.receipts.slice().reverse())}</div>`}function rTable(a){return a.length?`<table><tr><th>วันที่</th><th>เล่ม/เลข</th><th>ผู้ชำระ</th><th>ช่องทาง</th><th>ยอด</th><th>สถานะ</th><th></th></tr>${a.map(r=>`<tr><td>${dth(r.createdAt)}</td><td>${r.bookNo}/${r.receiptNo}</td><td>${esc(r.payerName)}</td><td>${r.method}</td><td>${money(r.total)}</td><td>${r.status||'ปกติ'}</td><td class="actions"><button class="gold" onclick="printR('${r.id}','copy')">สำเนา</button><button class="bad" onclick="cancelR('${r.id}')">ยกเลิก</button></td></tr>`).join('')}</table>`:'<p>ยังไม่มีข้อมูล</p>'}async function cancelR(rid){let r=s.receipts.find(x=>x.id==rid);if(!r||r.status=='ยกเลิก')return;let rs=prompt('หมายเหตุการยกเลิก');if(!rs)return;if(remote){let z=await sb.rpc('cancel_receipt',{p_receipt_id:rid,p_reason:rs});if(z.error)return alert(z.error.message);s=mig(z.data.state)}else{r.status='ยกเลิก';r.cancelReason=rs}await save(1);render()}
function receiptForm(){let pro=s.projects.filter(p=>p.active),bk=s.books.find(b=>b.active&&!b.closed);return `<div class="card"><b>ผู้รับเงิน/ผู้ออกใบเสร็จ:</b> ${esc(me.name)} | <b>วันเวลา:</b> ${dth(new Date())} | <span class="tag">${bk?'เล่ม '+bk.bookNo:'ยังไม่มีเล่มใช้งาน'}</span></div><form class="card" onsubmit="saveReceipt(event)"><div class="row"><div class="c3"><label>ประเภทผู้ชำระ</label><select id="ptype" onchange="payerMode()"><option>บุคคล</option><option>หน่วยงาน</option></select></div><div class="c3 person"><label>คำนำหน้า</label><select id="ttl" onchange="otherT.classList.toggle('hide',ttl.value!='อื่นๆ')">${s.titles.map(x=>`<option>${esc(x)}</option>`).join('')}</select></div><div class="c3 person hide" id="otherT"><label>อื่นๆ</label><input id="ttlOther"></div><div class="c3 person"><label>ชื่อ</label><input id="fn"></div><div class="c3 person"><label>นามสกุล</label><input id="ln"></div><div class="c9 org hide"><label>ชื่อหน่วยงาน</label><input id="orgp"></div><div class="c6"><label>รายละเอียดบรรทัด 1</label><input id="d1"></div><div class="c6"><label>รายละเอียดบรรทัด 2</label><input id="d2"></div><div class="c3"><label>ชำระโดย</label><select id="method" onchange="payMode()"><option>เงินสด</option><option>เงินโอน</option></select></div><div class="c3 tran hide"><label>วันที่โอน</label><input id="trDate" type="date"></div><div class="c3 tran hide"><label>ธนาคารผู้ชำระ</label><select id="pb">${s.payerBanks.map(x=>`<option>${esc(x)}</option>`).join('')}</select></div><div class="c3 tran hide"><label>บัญชีมหาวิทยาลัย</label><select id="ub">${s.uniBanks.filter(b=>b.active).map(b=>`<option value='${b.id}'>${esc(b.bank)} ${esc(b.no)}</option>`).join('')}</select></div><div class="c6"><label>ชื่อโครงการ</label><select id="project">${pro.map(p=>`<option>${esc(p.name)}</option>`).join('')}</select></div><div class="c6"><label>รายละเอียดเพิ่มเติม</label><input id="more"></div></div><h3>รายการชำระเงิน</h3><div id="lines"></div><button type="button" onclick="addLine()">+ เพิ่มรายการ</button><div class="total">รวม <h2 id="tot">0.00</h2><span id="bt"></span></div><button class="pri">บันทึกแล้วพิมพ์</button></form>`}function payerMode(){document.querySelectorAll('.person').forEach(e=>e.classList.toggle('hide',ptype.value!='บุคคล'));document.querySelectorAll('.org').forEach(e=>e.classList.toggle('hide',ptype.value!='หน่วยงาน'))}function payMode(){document.querySelectorAll('.tran').forEach(e=>e.classList.toggle('hide',method.value!='เงินโอน'))}function addLine(){let box=document.getElementById('lines');if(!box)return;box.insertAdjacentHTML('beforeend',`<div class='item'><select class='iname'>${s.items.map(x=>`<option>${esc(x)}</option>`).join('')}</select><input class='amt' type='number' step='0.01' value='0' oninput='calc()'><button type='button' class='bad' onclick='this.parentElement.remove();calc()'>ลบ</button></div>`);calc()}function calc(){let t=[...document.querySelectorAll('.amt')].reduce((a,e)=>a+ +e.value,0);if(tot){tot.textContent=money(t);bt.textContent=baht(t)}}
async function saveReceipt(e){e.preventDefault();if(!checkUser())return;let b=s.books.find(x=>x.active&&!x.closed);if(!b)return alert('ยังไม่มีเล่มใช้งาน');let its=[...document.querySelectorAll('.item')].map(x=>({name:x.querySelector('.iname').value,amount:+x.querySelector('.amt').value})).filter(x=>x.amount>0);if(!its.length)return alert('กรุณาใส่รายการ');let payer=ptype.value=='บุคคล'?[ttl.value=='อื่นๆ'?ttlOther.value:ttl.value,fn.value,ln.value].filter(Boolean).join(' '):orgp.value;if(!payer.trim())return alert('กรุณากรอกผู้ชำระ');let bank=s.uniBanks.find(x=>x.id==(ub&&ub.value));let rec={id:id(),createdAt:new Date().toISOString(),issuerName:me.name,issuerCode:me.code,payerType:ptype.value,payerName:payer,detail1:d1.value,detail2:d2.value,method:method.value,transferDate:trDate?trDate.value:'',payerBank:pb?pb.value:'',universityBank:bank||null,project:project.value,moreDetail:more.value,items:its,total:its.reduce((a,x)=>a+x.amount,0),status:'ปกติ'};if(remote){let z=await sb.rpc('issue_receipt',{p_receipt:rec});if(z.error)return alert(z.error.message);s=mig(z.data.state);rec=z.data.receipt}else{let n=Math.max(b.start,b.latest+1);if(n>b.end)return alert('เล่มนี้เลขครบแล้ว');b.latest=n;rec.bookNo=b.bookNo;rec.receiptNo=String(n).padStart(3,'0');s.receipts.push(rec)}await save(1);render();printReceipt(rec,'both')}
let nums=['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'],pos=['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];function read(n){n=String(parseInt(n)||0);if(n=='0')return nums[0];let o='';[...n].forEach((c,i)=>{let d=+c,p=n.length-i-1;if(!d)return;if(p==0&&d==1&&n.length>1)o+='เอ็ด';else if(p==1&&d==1)o+='สิบ';else if(p==1&&d==2)o+='ยี่สิบ';else o+=nums[d]+pos[p]});return o}function baht(n){let [b,sat]=Number(n||0).toFixed(2).split('.');return read(b)+'บาท'+(+sat?read(sat)+'สตางค์':'ถ้วน')}
function printR(rid,mode){let r=s.receipts.find(x=>x.id==rid);if(r)printReceipt(r,mode)}function printReceipt(r,mode){print.innerHTML=(mode=='both'?page(r,'ต้นฉบับ'):'')+page(r,'สำเนา');setTimeout(()=>window.print(),100)}function page(r,copy){let pro=r.project&&r.project!='ไม่ระบุโครงการ'?`<b>ชื่อโครงการ:</b> ${esc(r.project)}<br>`:'';return `<section class="page ${r.status=='ยกเลิก'?'cancel':''}"><div class="wm">RUS</div><div class="rhead"><div class="garuda">ครุฑ</div><div class="center"><div class="rtitle">${esc(s.orgName)}</div><div class="meta">${esc(s.orgAddress)}</div><h2>ใบเสร็จรับเงิน</h2></div><div class="meta right"><b>${copy}</b><br>เล่มที่ ${r.bookNo}<br>เลขที่ ${r.receiptNo}<br>วันที่ ${day(r.createdAt)}</div></div><p><b>ได้รับเงินจาก</b> ${esc(r.payerName)}<br>${esc(r.detail1||'')} ${esc(r.detail2||'')} ${r.moreDetail?'<br>'+esc(r.moreDetail):''}</p><table class="rtab"><tr><th>รายการชำระเงิน</th><th style="width:32mm">จำนวนเงิน</th></tr><tr><td class="itemsCell">${pro}${r.items.map(i=>esc(i.name)).join('<br>')}</td><td class="itemsCell right">${r.items.map(i=>money(i.amount)).join('<br>')}</td></tr><tr><td class="center"><b>(${baht(r.total)})</b></td><td class="right"><b>${money(r.total)}</b></td></tr></table><div class="right">ไว้เป็นการถูกต้องแล้ว<br><div class="sig"><div></div><div>(${esc(r.issuerName)})</div><div>${esc(s.position)}</div></div></div>${r.status=='ยกเลิก'?'<p>หมายเหตุ: '+esc(r.cancelReason||'')+'</p>':''}</section>`}
function reports(){return `<div class="card"><button onclick="repMode='detail';updReport()">แยกรายการ</button> <button onclick="repMode='day';updReport()">รายวัน</button> <button onclick="repMode='month';updReport()">รายเดือน</button> <button onclick="repMode='year';updReport()">รายปี</button> <button class="gold" onclick="exportCSV(currentRows(),'report.csv')">Export CSV</button> <button class="pri" onclick="window.print()">Print/PDF</button></div><div class="card" id="rep"></div>`}function rows(){let out=[];s.receipts.forEach(r=>(r.items||[]).forEach(i=>out.push({date:day(r.createdAt),time:new Date(r.createdAt).toLocaleTimeString('th-TH'),bookNo:r.bookNo,receiptNo:r.receiptNo,payer:r.payerName,project:r.project=='ไม่ระบุโครงการ'?'':r.project,method:r.method,status:r.status,issuer:r.issuerName,item:i.name,amount:i.amount,createdAt:r.createdAt})));return out}function currentRows(){return rows()}function updReport(){let a=currentRows();if(repMode!='detail'){let m={};a.forEach(r=>{let d=new Date(r.createdAt),k=repMode=='year'?d.getFullYear()+543:repMode=='month'?(d.getFullYear()+543)+'-'+(d.getMonth()+1):r.date;m[k]=(m[k]||0)+r.amount});a=Object.entries(m).map(x=>({period:x[0],amount:x[1]}))}rep.innerHTML=tbl(a)}function tbl(a){let k=Object.keys(a[0]||{date:'',time:'',bookNo:'',receiptNo:'',payer:'',project:'',method:'',status:'',issuer:'',item:'',amount:''});return `<table><tr>${k.map(x=>`<th>${x}</th>`).join('')}</tr>${a.map(r=>`<tr>${k.map(x=>`<td>${esc(r[x])}</td>`).join('')}</tr>`).join('')}</table>`}function exportCSV(a,name){let k=Object.keys(a[0]||{}),csv='\ufeff'+[k.join(',')].concat(a.map(r=>k.map(x=>'"'+String(r[x]??'').replace(/"/g,'""')+'"').join(','))).join('\n'),A=document.createElement('a');A.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));A.download=name;A.click()}
connect();drawLogin();drawMode();
</script></body></html>

<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ระบบออกใบเสร็จรับเงิน | มทร.สุวรรณภูมิ</title>
<script src="supabase-config.js"></script>
<style>
:root{--red:#9b2134;--gold:#b57a09;--bg:#f7f4ed;--ink:#1f2937;--line:#e5e7eb}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Tahoma,sans-serif;color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer}.hide{display:none!important}.pri{background:var(--red);color:white}.gold{background:var(--gold);color:white}.bad{background:#fee2e2;color:#991b1b}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.box{background:white;border-radius:24px;box-shadow:0 15px 45px #0002;max-width:900px;width:100%;display:grid;grid-template-columns:1fr 1.1fr;overflow:hidden}.hero{background:linear-gradient(150deg,var(--red),var(--gold));color:white;padding:38px}.logo{width:74px;height:74px;border-radius:50%;background:white;margin-bottom:20px}.form{padding:38px}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#f0f1f3;border-radius:14px;padding:6px;gap:6px}.tabs button{background:transparent}.tabs .on{background:white;color:var(--red);box-shadow:0 0 0 2px #2563eb inset}label{display:block;margin:12px 0 6px;font-weight:700}input,select,textarea{width:100%;border:1px solid #cfd3d8;border-radius:10px;padding:10px;background:white}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{background:#222;color:white;padding:20px}.side button{width:100%;text-align:left;margin:4px 0;background:transparent;color:white}.side button.on,.side button:hover{background:#ffffff22}.main{padding:24px}.card{background:white;border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 4px 16px #0001}.grid{display:grid;gap:12px}.g4{grid-template-columns:repeat(4,1fr)}.row{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;align-items:end}.c2{grid-column:span 2}.c3{grid-column:span 3}.c4{grid-column:span 4}.c6{grid-column:span 6}.c8{grid-column:span 8}.c12{grid-column:span 12}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #eee;padding:8px;text-align:left;vertical-align:top}th{background:#fafafa}.actions{display:flex;gap:6px;flex-wrap:wrap}.item{display:grid;grid-template-columns:1fr 140px auto;gap:8px;margin:6px 0}.tag{border-radius:99px;background:#eee;padding:4px 8px}.print{display:none}.pageA5{width:148mm;min-height:210mm;background:white;padding:9mm;page-break-after:always;position:relative}.garuda{width:54px;height:54px;display:grid;place-items:center;border:1px solid #999;border-radius:50%;font-size:11px}.wm{position:absolute;inset:70mm 0 0;text-align:center;font-size:70px;font-weight:900;color:#9b213410;height:70mm}.rhead{display:grid;grid-template-columns:55px 1fr 120px;gap:8px;position:relative;z-index:1}.rtab{width:100%;table-layout:fixed;position:relative;z-index:1}.rtab td,.rtab th{border:1px solid #111;font-size:12px}.itemsCell{height:88mm}.center{text-align:center}.right{text-align:right}@media(max-width:850px){.box,.app,.g4,.row{grid-template-columns:1fr}.c2,.c3,.c4,.c6,.c8,.c12{grid-column:auto}}@media print{body *{visibility:hidden!important}.print,.print *{visibility:visible!important}.print{display:block!important;position:absolute;inset:0}.pageA5{margin:0}@page{size:A5 portrait;margin:0}}
</style>
</head>
<body>
<section id="login" class="login">
  <div class="box">
    <div class="hero"><div class="logo"></div><h1>ระบบออกใบเสร็จรับเงิน</h1><p>มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ<br>ต้นฉบับ/สำเนา รายงาน เล่มใบเสร็จ และฐานข้อมูลกลาง</p></div>
    <div class="form">
      <div class="tabs"><button id="btnUser" class="on" type="button">User</button><button id="btnAdmin" type="button">Admin</button></div>
      <form id="loginForm">
        <div id="userBox"><label>รหัสผู้ใช้งาน 4 หลัก</label><input id="userCode" maxlength="4" inputmode="numeric" autocomplete="off"><small>ใช้ได้เฉพาะรหัสที่ Admin สร้างเท่านั้น</small></div>
        <div id="adminBox" class="hide"><label>Username</label><input id="adminUser" autocomplete="off"><label>Password</label><input id="adminPass" type="password"></div>
        <button class="pri" style="width:100%;margin-top:16px">เข้าสู่ระบบ</button><p class="tag">Local Browser</p>
      </form>
    </div>
  </div>
</section>
<section id="app" class="app hide"><aside class="side"><h2>RUS Receipt</h2><p><b id="who"></b><br><span id="whoRole"></span></p><nav id="nav"></nav><button id="logout" type="button">ออกจากระบบ</button></aside><main class="main"><h1 id="title"></h1><div id="view"></div></main></section><div id="print" class="print"></div>
<script>
const KEY='rus_receipt_v7_admin_created_users_only',ADMIN='admin',PASS='9999';let role='user',current=null,page='dash';
let data=load();
function load(){try{let x=JSON.parse(localStorage.getItem(KEY)||'null');if(x)return norm(x)}catch(e){}return norm({users:[],titles:['นาย','นาง','นางสาว','ดร.','อื่นๆ'],items:['ค่าลงทะเบียน','ค่าธรรมเนียมธนาคาร','ค่าบำรุงการศึกษา'],projects:[{name:'ไม่ระบุโครงการ',active:true},{name:'โครงการบริการวิชาการ',active:true}],payerBanks:['ธนาคารกรุงไทย','ธนาคารไทยพาณิชย์','ธนาคารกสิกรไทย','ธนาคารกรุงเทพ'],uniBanks:[{id:'b1',bank:'ธนาคารกรุงไทย',name:'มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ',no:'000-0-00000-0',active:true}],books:[{id:'bk1',bookNo:'2569-001',start:1,end:500,latest:0,active:true,closed:false}],receipts:[],org:'มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ',addr:'ที่อยู่มหาวิทยาลัย / แก้ไขในเมนูระบบ',position:'เจ้าหน้าที่ผู้รับชำระเงิน'})}
function norm(x){x.users=(x.users||[]).filter(u=>!(u.code==='1001'&&u.name==='เจ้าหน้าที่รับเงิน')).map(u=>({code:String(u.code||''),name:u.name||'',active:u.active!==false}));x.titles=x.titles&&x.titles.length?x.titles:['นาย','นาง','นางสาว','ดร.','อื่นๆ'];x.items=x.items&&x.items.length?x.items:['ค่าลงทะเบียน'];x.projects=(x.projects&&x.projects.length?x.projects:[{name:'ไม่ระบุโครงการ',active:true}]).map(p=>typeof p==='string'?{name:p,active:true}:p);if(!x.projects.some(p=>p.name==='ไม่ระบุโครงการ'))x.projects.unshift({name:'ไม่ระบุโครงการ',active:true});x.payerBanks=x.payerBanks||[];x.uniBanks=x.uniBanks||[];x.books=x.books||[];x.receipts=x.receipts||[];x.org=x.org||'มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ';x.addr=x.addr||'';x.position=x.position||'เจ้าหน้าที่ผู้รับชำระเงิน';return x}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function id(){return'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8)}function money(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}function dth(x){return new Date(x).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}
btnUser.onclick=()=>setRole('user');btnAdmin.onclick=()=>setRole('admin');function setRole(r){role=r;btnUser.classList.toggle('on',r==='user');btnAdmin.classList.toggle('on',r==='admin');userBox.classList.toggle('hide',r!=='user');adminBox.classList.toggle('hide',r!=='admin')}
loginForm.onsubmit=e=>{e.preventDefault();if(role==='admin'){if(adminUser.value.trim()===ADMIN&&adminPass.value===PASS){current={role:'admin',name:'ผู้ดูแลระบบ'};page='dash';enter()}else alert('Username หรือ Password ไม่ถูกต้อง')}else{let code=userCode.value.trim(),u=data.users.find(x=>x.code===code);if(!/^\d{4}$/.test(code))return alert('กรุณากรอกรหัส 4 หลัก');if(!u)return alert('รหัสนี้ยังไม่ได้สร้างโดย Admin');if(!u.active)return alert('User นี้ถูกปิดใช้งาน');current={role:'user',name:u.name,code:u.code};page='new';enter()}};logout.onclick=()=>{current=null;app.classList.add('hide');login.classList.remove('hide')};
function enter(){login.classList.add('hide');app.classList.remove('hide');who.textContent=current.name;whoRole.textContent=current.role;drawNav();drawPage()}
function drawNav(){let m=current.role==='admin'?[['dash','แดชบอร์ด'],['users','ผู้ใช้งาน'],['setup','เมนูระบบ'],['banks','บัญชีธนาคาร'],['books','เล่มที่/เลขที่'],['receipts','ใบเสร็จ'],['reports','รายงาน'],['new','ออกใบเสร็จ']]:[['new','ออกใบเสร็จ']];nav.innerHTML=m.map(x=>`<button class='${page===x[0]?'on':''}' data-p='${x[0]}'>${x[1]}</button>`).join('');nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{page=b.dataset.p;drawNav();drawPage()})}
function drawPage(){if(current.role!=='admin'&&page!=='new')page='new';let names={dash:'แดชบอร์ด',users:'ผู้ใช้งาน',setup:'เมนูระบบ',banks:'บัญชีธนาคาร',books:'เล่มที่/เลขที่',receipts:'ใบเสร็จ',reports:'รายงาน',new:'บันทึกรายการชำระเงิน'};title.textContent=names[page];view.innerHTML=({dash,users,setup,banks,books,receipts,reports,new:newReceipt}[page])();bindPage()}
function dash(){let ok=data.receipts.filter(r=>r.status!=='ยกเลิก'),can=data.receipts.filter(r=>r.status==='ยกเลิก'),sum=ok.reduce((a,r)=>a+Number(r.total||0),0);return`<div class='grid g4'><div class='card'><b>ทั้งหมด</b><h1>${data.receipts.length}</h1></div><div class='card'><b>ปกติ</b><h1>${ok.length}</h1></div><div class='card'><b>ยกเลิก</b><h1>${can.length}</h1></div><div class='card'><b>ยอดรับสุทธิ</b><h1>${money(sum)}</h1></div></div><div class='card'><h3>ใบเสร็จล่าสุด</h3>${receiptTable(data.receipts.slice(-8).reverse())}</div>`}
function users(){return`<div class='card'><h3>เพิ่ม User</h3><div class='row'><div class='c3'><label>รหัส 4 หลัก</label><input id='uc' maxlength='4'></div><div class='c6'><label>ชื่อ-นามสกุล</label><input id='un'></div><div class='c3'><button class='pri' id='addUser'>เพิ่ม User</button></div></div></div><div class='card'><table><tr><th>รหัส</th><th>ชื่อ</th><th>สถานะ</th><th></th></tr>${data.users.map((u,i)=>`<tr><td>${u.code}</td><td>${esc(u.name)}</td><td>${u.active?'ใช้งาน':'ปิด'}</td><td class='actions'><button data-edit='${i}'>แก้ไข</button><button data-toggle='${i}'>${u.active?'ปิด':'เปิด'}</button><button class='bad' data-del='${i}'>ลบ</button></td></tr>`).join('')}</table></div>`}
function setup(){return`<div class='card'><h3>ข้อมูลองค์กร</h3><label>ชื่อมหาวิทยาลัย</label><input id='org' value='${esc(data.org)}'><label>ที่อยู่</label><textarea id='addr'>${esc(data.addr)}</textarea><label>ตำแหน่ง</label><input id='pos' value='${esc(data.position)}'><button class='pri' id='saveOrg'>บันทึก</button></div><div class='card'><h3>ชื่อโครงการ</h3><input id='projName'><button id='addProj'>เพิ่ม</button><table>${data.projects.map((p,i)=>`<tr><td>${esc(p.name)}</td><td>${p.active?'เปิด':'ปิด'}</td><td>${p.name==='ไม่ระบุโครงการ'?'':`<button data-proj='${i}'>เปิด/ปิด</button>`}</td></tr>`).join('')}</table></div>`}
function banks(){return`<div class='card'><h3>บัญชีมหาวิทยาลัย</h3><div class='row'><div class='c3'><input id='bb' placeholder='ธนาคาร'></div><div class='c4'><input id='bn' placeholder='ชื่อบัญชี'></div><div class='c3'><input id='bno' placeholder='เลขบัญชี'></div><div class='c2'><button class='pri' id='addBank'>เพิ่ม</button></div></div><table>${data.uniBanks.map((b,i)=>`<tr><td>${esc(b.bank)}</td><td>${esc(b.name)}</td><td>${esc(b.no)}</td><td>${b.active?'เปิด':'ปิด'}</td><td><button data-bank='${i}'>เปิด/ปิด</button></td></tr>`).join('')}</table></div>`}
function books(){return`<div class='card'><h3>เพิ่มเล่ม</h3><div class='row'><div class='c3'><input id='bookNo' placeholder='เล่มที่'></div><div class='c2'><input id='start' type='number' value='1'></div><div class='c2'><input id='end' type='number' value='500'></div><div class='c2'><input id='latest' type='number' value='0'></div><div class='c3'><button class='pri' id='addBook'>เพิ่ม</button></div></div></div><div class='card'><table><tr><th>เล่ม</th><th>ช่วง</th><th>ล่าสุด</th><th>สถานะ</th><th></th></tr>${data.books.map((b,i)=>`<tr><td>${esc(b.bookNo)}</td><td>${b.start}-${b.end}</td><td>${b.latest}</td><td>${b.active&&!b.closed?'ใช้งาน':b.closed?'ปิด':'ไม่ใช้งาน'}</td><td class='actions'><button data-usebook='${i}'>ตั้งใช้</button><button data-closebook='${i}'>เปิด/ปิด</button></td></tr>`).join('')}</table></div>`}
function receipts(){return`<div class='card'>${receiptTable(data.receipts.slice().reverse())}</div>`}function receiptTable(a){return a.length?`<table><tr><th>วันที่</th><th>เล่ม/เลข</th><th>ผู้ชำระ</th><th>ยอด</th><th>สถานะ</th><th></th></tr>${a.map(r=>`<tr><td>${dth(r.date)}</td><td>${r.bookNo}/${r.no}</td><td>${esc(r.payer)}</td><td>${money(r.total)}</td><td>${r.status}</td><td class='actions'><button class='gold' data-print='${r.id}'>สำเนา</button><button class='bad' data-cancel='${r.id}'>ยกเลิก</button></td></tr>`).join('')}</table>`:'<p>ยังไม่มีใบเสร็จ</p>'}
function newReceipt(){let b=data.books.find(x=>x.active&&!x.closed);return`<div class='card'><b>ผู้รับเงิน:</b> ${esc(current.name)} | <span class='tag'>${b?'เล่ม '+b.bookNo:'ยังไม่มีเล่มใช้งาน'}</span></div><form id='rf' class='card'><div class='row'><div class='c3'><label>ประเภทผู้ชำระ</label><select id='ptype'><option>บุคคล</option><option>หน่วยงาน</option></select></div><div class='c3 person'><label>คำนำหน้า</label><select id='titleSel'>${data.titles.map(x=>`<option>${esc(x)}</option>`).join('')}</select></div><div class='c3 person'><label>ชื่อ</label><input id='fname'></div><div class='c3 person'><label>นามสกุล</label><input id='lname'></div><div class='c9 org hide'><label>ชื่อหน่วยงาน</label><input id='orgName'></div><div class='c6'><label>รายละเอียด 1</label><input id='d1'></div><div class='c6'><label>รายละเอียด 2</label><input id='d2'></div><div class='c4'><label>ช่องทาง</label><select id='method'><option>เงินสด</option><option>เงินโอน</option></select></div><div class='c4'><label>ชื่อโครงการ</label><select id='proj'>${data.projects.filter(p=>p.active).map(p=>`<option>${esc(p.name)}</option>`).join('')}</select></div><div class='c4'><label>รายละเอียดเพิ่ม</label><input id='more'></div></div><h3>รายการชำระเงิน</h3><div id='lines'></div><button type='button' id='addLine'>+ เพิ่มรายการ</button><h2 class='right'>รวม <span id='total'>0.00</span></h2><button class='pri'>บันทึกแล้วพิมพ์</button></form>`}
function reports(){let rows=[];data.receipts.forEach(r=>(r.lines||[]).forEach(l=>rows.push({date:dth(r.date),bookNo:r.bookNo,no:r.no,payer:r.payer,project:r.project==='ไม่ระบุโครงการ'?'':r.project,method:r.method,status:r.status,issuer:r.issuer,item:l.name,amount:l.amount})));return`<div class='card'><button class='gold' id='csv'>Export CSV</button></div><div class='card'><table><tr><th>วันที่</th><th>เล่ม</th><th>เลขที่</th><th>ผู้ชำระ</th><th>โครงการ</th><th>ช่องทาง</th><th>สถานะ</th><th>ผู้ออก</th><th>รายการ</th><th>จำนวนเงิน</th></tr>${rows.map(r=>`<tr><td>${r.date}</td><td>${r.bookNo}</td><td>${r.no}</td><td>${esc(r.payer)}</td><td>${esc(r.project)}</td><td>${r.method}</td><td>${r.status}</td><td>${esc(r.issuer)}</td><td>${esc(r.item)}</td><td>${money(r.amount)}</td></tr>`).join('')}</table></div>`}
function bindPage(){if(page==='users'){addUser.onclick=()=>{if(!/^\d{4}$/.test(uc.value))return alert('รหัสต้องเป็น 4 หลัก');if(data.users.some(u=>u.code===uc.value))return alert('รหัสซ้ำ');data.users.push({code:uc.value,name:un.value,active:true});save();drawPage()};view.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{data.users[b.dataset.toggle].active=!data.users[b.dataset.toggle].active;save();drawPage()});view.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{if(confirm('ลบ User?')){data.users.splice(b.dataset.del,1);save();drawPage()}});view.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{let u=data.users[b.dataset.edit],n=prompt('ชื่อ-นามสกุล',u.name);if(n!==null){u.name=n;save();drawPage()}})}if(page==='setup'){saveOrg.onclick=()=>{data.org=org.value;data.addr=addr.value;data.position=pos.value;save();alert('บันทึกแล้ว')};addProj.onclick=()=>{if(projName.value)data.projects.push({name:projName.value,active:true});save();drawPage()};view.querySelectorAll('[data-proj]').forEach(b=>b.onclick=()=>{data.projects[b.dataset.proj].active=!data.projects[b.dataset.proj].active;save();drawPage()})}if(page==='banks'){addBank.onclick=()=>{data.uniBanks.push({id:id(),bank:bb.value,name:bn.value,no:bno.value,active:true});save();drawPage()};view.querySelectorAll('[data-bank]').forEach(b=>b.onclick=()=>{data.uniBanks[b.dataset.bank].active=!data.uniBanks[b.dataset.bank].active;save();drawPage()})}if(page==='books'){addBook.onclick=()=>{let st=+start.value,en=+end.value;if(en<st||en-st+1>500)return alert('1 เล่มไม่เกิน 500 เลข');data.books.push({id:id(),bookNo:bookNo.value,start:st,end:en,latest:+latest.value,active:false,closed:false});save();drawPage()};view.querySelectorAll('[data-usebook]').forEach(b=>b.onclick=()=>{data.books.forEach(x=>x.active=false);let bk=data.books[b.dataset.usebook];if(!bk.closed)bk.active=true;save();drawPage()});view.querySelectorAll('[data-closebook]').forEach(b=>b.onclick=()=>{let bk=data.books[b.dataset.closebook];bk.closed=!bk.closed;if(bk.closed)bk.active=false;save();drawPage()})}if(page==='new'){function add(){lines.insertAdjacentHTML('beforeend',`<div class='item'><select>${data.items.map(x=>`<option>${esc(x)}</option>`).join('')}</select><input type='number' step='0.01' value='0'><button type='button' class='bad'>ลบ</button></div>`);bindLines()}function calc(){let t=[...lines.querySelectorAll('input')].reduce((a,e)=>a+ +e.value,0);total.textContent=money(t)}function bindLines(){lines.querySelectorAll('input').forEach(i=>i.oninput=calc);lines.querySelectorAll('.bad').forEach(b=>b.onclick=()=>{b.parentElement.remove();calc()});calc()}addLine.onclick=add;ptype.onchange=()=>{view.querySelectorAll('.person').forEach(e=>e.classList.toggle('hide',ptype.value!=='บุคคล'));view.querySelectorAll('.org').forEach(e=>e.classList.toggle('hide',ptype.value!=='หน่วยงาน'))};rf.onsubmit=e=>{e.preventDefault();let bk=data.books.find(x=>x.active&&!x.closed);if(!bk)return alert('ยังไม่มีเล่มใช้งาน');let ls=[...lines.children].map(x=>({name:x.querySelector('select').value,amount:+x.querySelector('input').value})).filter(x=>x.amount>0);if(!ls.length)return alert('กรุณาใส่รายการ');let payer=ptype.value==='บุคคล'?[titleSel.value,fname.value,lname.value].filter(Boolean).join(' '):orgName.value;if(!payer.trim())return alert('กรุณากรอกผู้ชำระ');let n=Math.max(bk.start,bk.latest+1);if(n>bk.end)return alert('เลขในเล่มครบแล้ว');bk.latest=n;let r={id:id(),date:new Date().toISOString(),bookNo:bk.bookNo,no:String(n).padStart(3,'0'),payer,detail:d1.value+' '+d2.value,method:method.value,project:proj.value,more:more.value,lines:ls,total:ls.reduce((a,x)=>a+x.amount,0),status:'ปกติ',issuer:current.name};data.receipts.push(r);save();printReceipt(r,true);drawPage()};add()}view.querySelectorAll('[data-print]').forEach(b=>b.onclick=()=>printReceipt(data.receipts.find(r=>r.id===b.dataset.print),false));view.querySelectorAll('[data-cancel]').forEach(b=>b.onclick=()=>{let r=data.receipts.find(r=>r.id===b.dataset.cancel);if(r&&r.status!=='ยกเลิก'){let reason=prompt('หมายเหตุการยกเลิก');if(reason){r.status='ยกเลิก';r.cancelReason=reason;save();drawPage()}}});if(page==='reports'&&document.getElementById('csv'))csv.onclick=exportCSV}
function printReceipt(r,both){print.innerHTML=(both?pageA5(r,'ต้นฉบับ'):'')+pageA5(r,'สำเนา');setTimeout(()=>window.print(),100)}function pageA5(r,kind){let pro=r.project&&r.project!=='ไม่ระบุโครงการ'?`<b>ชื่อโครงการ:</b> ${esc(r.project)}<br>`:'';return`<section class='pageA5'><div class='wm'>RUS</div><div class='rhead'><div class='garuda'>ครุฑ</div><div class='center'><b>${esc(data.org)}</b><div>${esc(data.addr)}</div><h2>ใบเสร็จรับเงิน</h2></div><div class='right'><b>${kind}</b><br>เล่มที่ ${r.bookNo}<br>เลขที่ ${r.no}<br>${dth(r.date)}</div></div><p style='position:relative;z-index:1'><b>ได้รับเงินจาก</b> ${esc(r.payer)}<br>${esc(r.detail||'')} ${esc(r.more||'')}</p><table class='rtab'><tr><th>รายการชำระเงิน</th><th style='width:32mm'>จำนวนเงิน</th></tr><tr><td class='itemsCell'>${pro}${r.lines.map(l=>esc(l.name)).join('<br>')}</td><td class='itemsCell right'>${r.lines.map(l=>money(l.amount)).join('<br>')}</td></tr><tr><td class='center'><b>(${money(r.total)} บาท)</b></td><td class='right'><b>${money(r.total)}</b></td></tr></table><p class='right'>ไว้เป็นการถูกต้องแล้ว<br><br>(${esc(r.issuer)})<br>${esc(data.position)}</p>${r.status==='ยกเลิก'?'<h1 class=center>ยกเลิก</h1><p>หมายเหตุ: '+esc(r.cancelReason||'')+'</p>':''}</section>`}
function exportCSV(){let rows=[];data.receipts.forEach(r=>(r.lines||[]).forEach(l=>rows.push([dth(r.date),r.bookNo,r.no,r.payer,r.project,r.method,r.status,r.issuer,l.name,l.amount])));let csv='\ufeffวันที่,เล่มที่,เลขที่,ผู้ชำระ,ชื่อโครงการ,ช่องทาง,สถานะ,ผู้ออก,รายการ,จำนวนเงิน\n'+rows.map(r=>r.map(x=>'"'+String(x??'').replace(/"/g,'""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='report.csv';a.click()}
</script>
</body>
